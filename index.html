<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timber Ridge Volleyball</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Bungee&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
        }
        .font-display { font-family: 'Fredoka', sans-serif; }
        .font-bungee { font-family: 'Bungee', cursive; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        /* Checkbox animation */
        .check-item { transition: all 0.3s ease; }
        .check-item.checked { opacity: 0.5; transform: scale(0.98); }
        .check-item.checked label { text-decoration: line-through; color: #64748b; }
        
        /* Card hover effects */
        .event-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
        }
        .event-card:hover { 
            transform: translateX(4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        
        /* Game vs Practice styling */
        .game-card { 
            background: linear-gradient(135deg, #2d1b2e 0%, #1e1b2e 100%); 
            border-left-color: #f472b6;
            border: 1px solid rgba(244, 114, 182, 0.2);
        }
        .practice-card { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            border-left-color: #2dd4bf;
            border: 1px solid rgba(45, 212, 191, 0.2);
        }
        .special-card {
            background: linear-gradient(135deg, #2d2016 0%, #1e1b16 100%);
            border-left-color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.2);
        }
        
        /* Floating nav */
        .float-nav {
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }
        
        /* Pulse animation for next event */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4), 0 0 40px rgba(251, 191, 36, 0.2); }
            50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.6), 0 0 60px rgba(251, 191, 36, 0.3); }
        }
        .next-up { animation: pulse-glow 2s infinite; }
        
        /* Neon text effects */
        .neon-teal { text-shadow: 0 0 10px rgba(45, 212, 191, 0.5); }
        .neon-pink { text-shadow: 0 0 10px rgba(244, 114, 182, 0.5); }
        
        /* Confetti */
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }
        @keyframes confetti-pop {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #2dd4bf 0%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>

                    🏐
